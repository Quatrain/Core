services:
  engine:
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    ports:
      - 4001:4001
    environment:
      NODE_ENV: production
    networks:
      - env-local-net
    volumes:
      - ./quatrain.json:/app/quatrain.json:ro
      - ./data:/app/data
      - local_storage_data:/data/storage
  ui:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 3000:80
    networks:
      - env-local-net
    depends_on:
      - engine
volumes:
  local_storage_data: {}
networks:
  env-local-net:
    driver: bridge

# SonarQube / SonarCloud Project Metadata
sonar.projectKey=Quatrain_Core
sonar.organization=quatrain-technologies

# Sources and Tests Configuration
sonar.sources=packages,apps
sonar.tests=packages,apps
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx
sonar.exclusions=**/node_modules/**,**/dist/**/*.js,**/dist/**/*.js.map,**/build/**,**/coverage/**,**/apps/studio-web/.next/**,**/*.sql


# Javascript & Typescript Coverage Settings
sonar.coverage.exclusions=**/*.migration.ts
sonar.cpd.exclusions=packages/i18n-*/**/*.ts,packages/studio/src/models/**/*.ts,packages/core-cli/src/commands/generate/config.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
